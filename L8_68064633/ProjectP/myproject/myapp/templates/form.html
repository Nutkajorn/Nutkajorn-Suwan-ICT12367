{% extends "base.html" %}

{% block title %}
<title>สั่งเมนู</title>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow">
            <div class="card-header text-white text-center fw-bold fs-4" style="background:#6f4e37;">
                แบบฟอร์มสั่งเมนูเครื่องดื่ม
            </div>
            <div class="card-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label">ชื่อลูกค้า</label>
                        <input type="text" class="form-control" placeholder="กรอกชื่อผู้สั่ง">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">เมนูที่ต้องการ</label>
                        <select class="form-select">
                            <option>ลาเต้</option>
                            <option>คาปูชิโน</option>
                            <option>อเมริกาโน</option>
                            <option>มอคค่า</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">ขนาดแก้ว</label>
                        <select class="form-select">
                            <option>Small</option>
                            <option>Medium</option>
                            <option>Large</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">หมายเหตุเพิ่มเติม</label>
                        <textarea class="form-control" rows="3" placeholder="เช่น หวานน้อย ไม่ใส่นม"></textarea>
                    </div>

                    <button type="submit" class="btn btn-success">ยืนยันรายการ</button>
                    <button type="reset" class="btn btn-secondary">ล้างข้อมูล</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
