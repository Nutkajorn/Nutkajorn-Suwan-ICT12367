<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}{% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background:#f7f3ee;
            font-family:Arial,sans-serif;
        }
        .navbar-custom{
            background:#6f4e37;
        }
        .hero{
            height:320px;
            background:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1400&auto=format&fit=crop') center/cover no-repeat;
            position:relative;
        }
        .hero::before{
            content:"";
            position:absolute;
            inset:0;
            background:rgba(0,0,0,0.45);
        }
        .hero-content{
            position:relative;
            z-index:1;
            height:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
        }
        .section-title{
            color:#6f4e37;
            font-weight:700;
        }
        .info-card img{
            height:220px;
            object-fit:cover;
        }
        .gallery-img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:10px;
        }
        .footer{
            background:#6f4e37;
            color:#fff;
            text-align:center;
            padding:14px 0;
            margin-top:30px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">68064633 ณัฐขจร สุวรรณ์</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">หน้าแรก</a></li>
                <li class="nav-item"><a class="nav-link" href="/form/">สั่งเมนู</a></li>
                <li class="nav-item"><a class="nav-link" href="/about/">แกลเลอรี</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="hero-content">
        <div>
            <h1 class="fw-bold">ยินดีต้อนรับสู่เว็บไซต์ร้านกาแฟตัวอย่าง</h1>
            <p class="fs-5">ออกแบบหน้าเว็บด้วย Django และ Bootstrap</p>
        </div>
    </div>
</section>

<div class="container my-4">
    {% block content %}{% endblock %}
</div>

<div class="footer">
    © 2024 Coffee House | Web Design Project
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
